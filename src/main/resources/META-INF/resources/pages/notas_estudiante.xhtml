<!DOCTYPE html>
<html lang="es"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Mis Notas - Kinal Notes</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
    <h:outputStylesheet library="css" name="theme.css"/>
    <link rel="stylesheet" href="#{request.contextPath}/css/theme.css" />
    <style>
        body {background:#ffffff; color:#222; font-family:'Inter',Arial,sans-serif; margin:0;}
        .page-wrapper {padding:1.25rem 1rem 3rem; max-width:1200px; margin:0 auto; box-sizing:border-box;}
        .card {background:#fff; border:1px solid #e5e7eb; border-radius:6px;}
        .card.spacing {margin:0 0 1.1rem; padding:.5rem .75rem;}
        .datatable-wrapper {padding:1rem 1rem 1.25rem;}
        h3 {margin:0; font-weight:600; letter-spacing:.4px;}
        .header-box {background:#f1f5f9; border:1px solid #e2e8f0; border-radius:6px; padding:.75rem 1rem; width:100%;}
    </style>
</h:head>
<h:body>
    <div class="page-wrapper">
        <div class="color-bar" style="margin:0 0 .75rem;">
            <span class="cb-blue"></span><span class="cb-green"></span><span class="cb-yellow"></span><span class="cb-red"></span><span class="cb-dark"></span>
        </div>
        <h:form id="formNotasEstudiante">
            <div style="font-size:.6rem; letter-spacing:.5px; color:#555; margin:0 0 .5rem;">
                <span class="badge badge-blue">NOTAS</span>
                <span class="badge badge-green" style="margin-left:4px;">CURSOS</span>
            </div>
            <div class="card spacing card-accent-dark subtle-shadow">
                <p:menubar>
                    <p:menuitem value="Menú Estudiante" icon="pi pi-arrow-left" outcome="/pages/menu_estudiantes.xhtml"/>
                    <p:menuitem value="Cursos Inscritos" icon="pi pi-book" outcome="/pages/cursos_estudiante.xhtml"/>
                    <p:menuitem value="Inscribirse" icon="pi pi-plus" outcome="/pages/inscripcion_cursos.xhtml"/>
                    <p:menuitem value="Notas" icon="pi pi-list" style="font-weight:bold; color:#2563eb;"/>
                    <p:menuitem value="Cerrar Sesión" icon="pi pi-sign-out" actionListener="#{authSession.logout}"/>
                </p:menubar>
            </div>
            <div class="card datatable-wrapper card-accent-green subtle-shadow">
                <p:dataTable id="tabla-notas" value="#{estudianteNotasView.notas}" var="n" paginator="true" rows="10" emptyMessage="No hay notas registradas" responsiveLayout="scroll">
                    <f:facet name="header">
                        <div class="header-box" style="display:flex; align-items:center; justify-content:space-between;">
                            <h3 class="header-accent" style="margin:0;">Mis Notas</h3>
                            <div style="font-size:.55rem; letter-spacing:.5px; color:#555;">
                                <span class="badge badge-green">TOTAL #{estudianteNotasView.notas != null ? estudianteNotasView.notas.size() : 0}</span>
                            </div>
                        </div>
                    </f:facet>
                    <p:column headerText="CURSO" sortBy="#{n.cursoNombre}" filterBy="#{n.cursoNombre}" filterMatchMode="contains">
                        <h:outputText value="#{n.cursoNombre}"/>
                    </p:column>
                    <p:column headerText="CÓDIGO CURSO" sortBy="#{n.cursoCodigo}" style="width:140px;">
                        <h:outputText value="#{n.cursoCodigo}"/>
                    </p:column>
                    <p:column headerText="NOTA" sortBy="#{n.calificacion}" style="width:120px; text-align:center;">
                        <h:outputText value="#{n.calificacion}" style="#{estudianteNotasView.styleNota(n.calificacion)}"/>
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>
    </div>
</h:body>
</html>
