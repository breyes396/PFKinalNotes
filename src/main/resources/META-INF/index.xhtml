<!DOCTYPE html>
<h:html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Menú Estudiante - KinalNotes</title>
        <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/themes/primeone-dark.css"/>
        <style>
            .menu-card {
                border-radius: 12px;
                background: #1e1e1e;
                box-shadow: 0 8px 20px rgba(0,0,0,0.5);
                text-align: center;
                padding: 20px;
                margin-bottom: 20px;
                transition: transform 0.3s, box-shadow 0.3s;
            }
            .menu-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 25px rgba(0,0,0,0.7);
            }
            .btn-custom {
                width: 100%;
                margin-top: 10px;
            }
            body {
                background-color: #121212;
                color: #f5f5f5;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            footer {
                text-align: center;
                margin-top: 50px;
                padding: 15px;
                background-color: #222;
                color: #fff;
                border-radius: 8px;
            }
        </style>
    </h:head>

    <h:body>
        <h:form id="formMenuEstudiante">
            <h1 class="text-center mb-5">Bienvenido, Estudiante</h1>

            <div class="p-grid p-justify-center">
                <!-- Cursos Inscritos -->
                <div class="p-col-12 p-md-4">
                    <div class="menu-card">
                        <h4>Cursos Inscritos</h4>
                        <p>Ver todos los cursos en los que estás registrado</p>
                        <p:button value="Ir" outcome="/estudiante/cursosInscritos" icon="pi pi-arrow-right" styleClass="btn-custom"/>
                    </div>
                </div>

                <!-- Cursos Disponibles -->
                <div class="p-col-12 p-md-4">
                    <div class="menu-card">
                        <h4>Cursos Disponibles</h4>
                        <p>Explora nuevos cursos para inscribirte</p>
                        <p:button value="Ir" outcome="/estudiante/cursosDisponibles" icon="pi pi-arrow-right" styleClass="btn-custom"/>
                    </div>
                </div>

                <!-- Notas -->
                <div class="p-col-12 p-md-4">
                    <div class="menu-card">
                        <h4>Notas</h4>
                        <p>Revisa tus calificaciones y progreso académico</p>
                        <p:button value="Ir" outcome="/estudiante/notas" icon="pi pi-arrow-right" styleClass="btn-custom"/>
                    </div>
                </div>
            </div>
        </h:form>

        <footer>
            KinalNotes - Sistema Estudiantes
        </footer>
    </h:body>
</h:html>
